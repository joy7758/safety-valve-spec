[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "svs-verify"
version = "0.1.0"
description = "SVS verifier CLI for receipts and compatibility attestations"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["cryptography>=46.0.7"]

[project.scripts]
svs-verify = "svs_verify.cli:main"
