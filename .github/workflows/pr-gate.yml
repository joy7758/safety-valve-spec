name: pr-gate

on:
  pull_request:
    branches: [ "main" ]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          python -m pip install cryptography fastapi uvicorn

      - name: RFC required check (spec/schema changes)
        run: |
          python tools/check_rfc_required.py

      - name: Run conformance
        run: |
          source .venv/bin/activate
          bash conformance/run.sh

      - name: Ensure working tree clean
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"
