name: svs-conformance

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version for conformance job
        required: false
        default: "3.11"
      time_window_seconds:
        description: Allowed receipt age in seconds
        required: false
        default: "300"
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.11"
      time_window_seconds:
        required: false
        type: string
        default: "300"

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.11' }}

      - name: Install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          python -m pip install cryptography fastapi uvicorn

      - name: Run conformance
        env:
          SVS_TIME_WINDOW: ${{ inputs.time_window_seconds || '300' }}
        run: |
          source .venv/bin/activate
          # If you later read SVS_TIME_WINDOW in verify config, wire it here.
          bash conformance/run.sh

      - name: Read report output
        run: |
          overall="$(python -c "import json; print(json.load(open('conformance/report.json', 'r', encoding='utf-8')).get('overall', 'UNKNOWN'))")"
          echo "overall=$overall"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: svs-artifacts
          path: |
            conformance/report.json
            dist/*
