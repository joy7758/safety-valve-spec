name: ci
on:
  push:
  pull_request:
jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify repository structure
        run: |
          test -f spec/receipt-v0.1.md
          test -f schemas/receipt.v0.1.json
          test -f conformance/tests.md
          test -f conformance/run.sh
      - name: Run conformance tests
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          python -m pip install cryptography fastapi uvicorn
          bash conformance/run.sh

      - name: Ensure working tree clean
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Ensure attestation exists
        run: |
          test -f dist/svs-compat.attestation.json

      - name: Ensure badge exists
        run: |
          test -f dist/svs-compat.attestation.json
          test -f dist/svs-compat.badge.svg
          test -f dist/svs-compat.badge.md

      - name: Ensure latest exists
        run: |
          test -f dist/svs-compat.latest.json

      - name: Smoke test svs-verify package
        run: |
          python -m venv .venv_pkg
          source .venv_pkg/bin/activate
          python -m pip install -U pip
          python -m pip install -e packages/svs_verify
          svs-verify --help
